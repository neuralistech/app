name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          FORMSPREE_ENDPOINT: ${{ secrets.FORMSPREE_ENDPOINT }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_R6d4OJC6lI0xmAKYpfbBWrBN
          VERCEL_PROJECT_ID: prj_uDfAybiajUuSi4NSSNVebGdGq3yh
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          FORMSPREE_ENDPOINT: ${{ secrets.FORMSPREE_ENDPOINT }}
        run: npx vercel --prod --token=$VERCEL_TOKEN --yes
